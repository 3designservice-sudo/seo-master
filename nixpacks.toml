# DS_YABIZ_NIXPACKS_v2
# Override default install phase: re-lock + sync without --locked flag,
# so adding new deps to pyproject.toml does not require local uv lock update.
# Then add Chromium for Playwright headless publisher.

[phases.install]
cmds = [
  "uv sync --no-dev",
]

[phases.playwright]
dependsOn = ["install"]
cmds = [
  "uv run playwright install --with-deps chromium",
]
